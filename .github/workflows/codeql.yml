name: CodeQL

on:
  push:
  pull_request:
  schedule:
    - cron: "24 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@4e57f1c8343b0eb863fdeb68f59b9b872f18b748
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-pi

  codeql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
