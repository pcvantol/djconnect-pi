name: CodeQL

on:
  push:
  pull_request:
  schedule:
    - cron: "24 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@b02217ab54ff5a93e9ba5ae406ac608f43ff8792
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-pi

  codeql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
