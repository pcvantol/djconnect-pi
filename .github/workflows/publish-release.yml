name: Publish Pi Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 3.1.2"
        required: true
        type: string
      prerelease:
        description: "Publish as GitHub prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@b02217ab54ff5a93e9ba5ae406ac608f43ff8792
    with:
      execution_profile: release
      owner: pcvantol/djconnect-pi

  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set release metadata
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${INPUT_VERSION}"
            prerelease="${INPUT_PRERELEASE}"
          else
            version="${GITHUB_REF_NAME#v}"
            prerelease="false"
          fi
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: ${version}" >&2
            exit 64
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xinput0

      - name: Upgrade Python packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Run Postman collection
        shell: bash
        run: |
          npm install --global newman
          ready_file="$(mktemp)"
          python tests/postman_mock_server.py --host 127.0.0.1 --port 18080 --token ci-token --ready-file "${ready_file}" &
          server_pid="$!"
          trap 'kill "${server_pid}"' EXIT
          for attempt in {1..20}; do
            if [[ -s "${ready_file}" ]]; then
              break
            fi
            sleep 0.5
          done
          client_api_url="$(cat "${ready_file}")"
          curl -fsS "${client_api_url}/api/device/info" >/dev/null
          newman run "docs/postman/DJConnect Pi Local Client API.postman_collection.json" \
            --env-var "client_api_url=${client_api_url}" \
            --env-var "device_token=ci-token" \
            --env-var "device_id=djconnect-raspberry-pi-ABCDEF123456" \
            --env-var "ha_url=http://homeassistant.local:8123"

      - name: Compile Python
        run: python -m compileall src tests

      - name: Build release assets
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        run: |
          version="${RELEASE_VERSION}"
          tag="${RELEASE_TAG}"
          prerelease="${RELEASE_PRERELEASE}"
          dist="dist/djconnect-pi-${version}"
          rm -rf "${dist}" "dist/djconnect-pi-${version}.tar.gz" "dist/djconnect-pi-${version}.sha256"
          mkdir -p "${dist}"
          cp -R LICENSE README.md CHANGELOG.md docs examples systemd "${dist}/"
          mkdir -p "${dist}/scripts"
          cp scripts/install.sh "${dist}/scripts/"
          mkdir -p "${dist}/wheels"
          python -m pip wheel --no-deps --wheel-dir "${dist}/wheels" .
          printf '%s\n' "${version}" > "${dist}/VERSION"
          tar -C dist -czf "dist/djconnect-pi-${version}.tar.gz" "djconnect-pi-${version}"
          shasum -a 256 "dist/djconnect-pi-${version}.tar.gz" > "dist/djconnect-pi-${version}.sha256"
          cat > "dist/djconnect-pi-latest.json" <<EOF
          {
            "version": "${version}",
            "tag_name": "${tag}",
            "prerelease": ${prerelease},
            "bundle": "https://github.com/pcvantol/djconnect-pi-releases/releases/download/${tag}/djconnect-pi-${version}.tar.gz",
            "checksum": "https://github.com/pcvantol/djconnect-pi-releases/releases/download/${tag}/djconnect-pi-${version}.sha256"
          }
          EOF
          VERSION="${version}" python - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          heading = f"## {version}"
          start = text.find(heading)
          if start < 0:
              raise SystemExit(f"Missing changelog section for {version}")
          next_start = text.find("\n## ", start + len(heading))
          section = text[start: next_start if next_start >= 0 else len(text)].strip() + "\n"
          Path(f"dist/djconnect-pi-{version}-release-notes.md").write_text(
              section,
              encoding="utf-8",
          )
          PY

      - name: Publish to public release repository
        env:
          GH_TOKEN: ${{ secrets.DJCONNECT_PI_RELEASES_TOKEN }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        shell: bash
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "Missing DJCONNECT_PI_RELEASES_TOKEN repository secret." >&2
            echo "Create it in pcvantol/djconnect-pi with Contents read/write access to pcvantol/djconnect-pi-releases." >&2
            exit 4
          fi
          version="${RELEASE_VERSION}"
          tag="${RELEASE_TAG}"
          prerelease="${RELEASE_PRERELEASE}"
          args=(
            release create "${tag}"
            --repo pcvantol/djconnect-pi-releases
            --title "DJConnect Pi ${tag}"
            --notes-file "dist/djconnect-pi-${version}-release-notes.md"
          )
          if [[ "${prerelease}" == "true" ]]; then
            args+=(--prerelease)
          fi
          args+=(
            "dist/djconnect-pi-${version}.tar.gz"
            "dist/djconnect-pi-${version}.sha256"
            "dist/djconnect-pi-latest.json"
          )
          gh "${args[@]}"
