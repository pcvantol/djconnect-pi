name: Semgrep

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@78852b8f714981794c63b92ff0d3083d06516099
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-pi

  semgrep:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config auto
