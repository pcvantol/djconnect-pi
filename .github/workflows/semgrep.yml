name: Semgrep

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@4e57f1c8343b0eb863fdeb68f59b9b872f18b748
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-pi

  semgrep:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: python -m pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config auto
