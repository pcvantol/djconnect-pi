name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  software-assurance-governance:
    name: Software Assurance governance
    permissions:
      contents: read
    uses: pcvantol/djconnect/.github/workflows/software-assurance-governance.yml@78852b8f714981794c63b92ff0d3083d06516099
    with:
      execution_profile: balanced
      owner: pcvantol/djconnect-pi

  python:
    uses: pcvantol/djconnect/.github/workflows/djconnect-python-ci.yml@78852b8f714981794c63b92ff0d3083d06516099
    with:
      source-path: src
      test-path: tests
      test-command: >-
        sudo apt-get update &&
        sudo apt-get install -y
        libegl1
        libgl1
        libxkbcommon-x11-0
        libxcb-cursor0
        libxcb-icccm4
        libxcb-image0
        libxcb-keysyms1
        libxcb-randr0
        libxcb-render-util0
        libxcb-shape0
        libxcb-xinerama0
        libxcb-xinput0 &&
        python -m pip install --upgrade pip setuptools wheel &&
        python -m pip install -e ".[dev]" &&
        python -m pytest
      ruff-continue-on-error: true
      bandit-continue-on-error: true

  ha-contract-fixture:
    name: HA contract fixture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"

      - name: Run HA HTTP contract fixture
        run: node Tools/http_e2e_contract.js

      - name: Run HA WebSocket contract fixture
        run: node Tools/websocket_e2e_contract.js

      - name: Validate HA contract fixture redaction
        run: node Tools/validate_ha_contract_fixture_security.js

  post-merge-coverage:
    name: Post-merge coverage evidence
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - name: Generate exact-SHA coverage report
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xinput0
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]" coverage
          coverage run -m pytest
          coverage xml -o coverage.xml
          printf '%s\n' "$GITHUB_SHA" > coverage-main-sha.txt
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: pi-cobertura-coverage
          path: |
            coverage.xml
            coverage-main-sha.txt
          if-no-files-found: error

  cleanup-workflow-runs:
    name: Cleanup workflow runs
    needs:
      - python
      - ha-contract-fixture
      - post-merge-coverage
    if: >-
      ${{
        always() &&
        needs.python.result == 'success' &&
        needs.ha-contract-fixture.result == 'success' &&
        github.event_name != 'pull_request' &&
        (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
      }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      CURRENT_RUN_ID: ${{ github.run_id }}
      KEEP_RUNS: "2"
    steps:
      - name: Delete old completed workflow runs
        shell: bash
        run: |
          set -euo pipefail

          current_workflow_name="$(
            gh api "repos/${GH_REPO}/actions/runs/${CURRENT_RUN_ID}" \
              --jq '.name'
          )"
          runs_json="$(
            gh api --paginate --slurp \
              "repos/${GH_REPO}/actions/runs?status=completed&per_page=100"
          )"

          mapfile -t workflow_names < <(
            jq -r '[.[].workflow_runs[]?.name] | unique[]' <<< "${runs_json}"
          )

          for workflow_name in "${workflow_names[@]}"; do
            if [[ -z "${workflow_name}" ]]; then
              continue
            fi

            keep_limit="${KEEP_RUNS}"
            if [[ "${workflow_name}" == "${current_workflow_name}" ]]; then
              keep_limit=$((KEEP_RUNS - 1))
            fi

            mapfile -t run_ids < <(
              jq -r --arg workflow_name "${workflow_name}" '
                [.[].workflow_runs[]? | select(.name == $workflow_name)]
                | sort_by(.created_at)
                | reverse
                | .[].id
              ' <<< "${runs_json}"
            )

            if ((${#run_ids[@]} <= keep_limit)); then
              echo "Deleted 0 old completed run(s) for ${workflow_name}."
              continue
            fi

            deleted_runs=0
            for index in "${!run_ids[@]}"; do
              run_id="${run_ids[$index]}"
              if [[ "${run_id}" == "${CURRENT_RUN_ID}" ]]; then
                continue
              fi

              if ((index < keep_limit)); then
                continue
              fi

              if gh api --method DELETE "repos/${GH_REPO}/actions/runs/${run_id}" >/dev/null; then
                deleted_runs=$((deleted_runs + 1))
              else
                echo "Run ${run_id} was already unavailable; continuing." >&2
              fi
            done

            echo "Deleted ${deleted_runs} old completed run(s) for ${workflow_name}."
          done
