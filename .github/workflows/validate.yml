name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    uses: pcvantol/djconnect/.github/workflows/djconnect-python-ci.yml@main
    with:
      source-path: src
      test-path: tests
      test-command: >-
        sudo apt-get update &&
        sudo apt-get install -y
        libegl1
        libgl1
        libxkbcommon-x11-0
        libxcb-cursor0
        libxcb-icccm4
        libxcb-image0
        libxcb-keysyms1
        libxcb-randr0
        libxcb-render-util0
        libxcb-shape0
        libxcb-xinerama0
        libxcb-xinput0 &&
        python -m pip install -e ".[dev]" &&
        python -m pytest
      ruff-continue-on-error: true
      bandit-continue-on-error: true
