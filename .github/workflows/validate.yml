name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    uses: pcvantol/djconnect/.github/workflows/djconnect-python-ci.yml@main
    with:
      source-path: src
      test-path: tests
      test-command: >-
        sudo apt-get update &&
        sudo apt-get install -y
        libegl1
        libgl1
        libxkbcommon-x11-0
        libxcb-cursor0
        libxcb-icccm4
        libxcb-image0
        libxcb-keysyms1
        libxcb-randr0
        libxcb-render-util0
        libxcb-shape0
        libxcb-xinerama0
        libxcb-xinput0 &&
        python -m pip install --upgrade pip setuptools wheel &&
        python -m pip install -e ".[dev]" &&
        python -m pytest
      ruff-continue-on-error: true
      bandit-continue-on-error: true

  cleanup-workflow-runs:
    name: Cleanup workflow runs
    needs: python
    if: >-
      ${{
        always() &&
        needs.python.result == 'success' &&
        github.event_name != 'pull_request' &&
        (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
      }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      CURRENT_RUN_ID: ${{ github.run_id }}
      KEEP_RUNS: "2"
    steps:
      - name: Delete old completed workflow runs
        shell: bash
        run: |
          set -euo pipefail

          current_workflow_name="$(
            gh api "repos/${GH_REPO}/actions/runs/${CURRENT_RUN_ID}" \
              --jq '.name'
          )"
          runs_json="$(
            gh api --paginate --slurp \
              "repos/${GH_REPO}/actions/runs?status=completed&per_page=100"
          )"

          mapfile -t workflow_names < <(
            jq -r '[.[].workflow_runs[]?.name] | unique[]' <<< "${runs_json}"
          )

          for workflow_name in "${workflow_names[@]}"; do
            if [[ -z "${workflow_name}" ]]; then
              continue
            fi

            keep_limit="${KEEP_RUNS}"
            if [[ "${workflow_name}" == "${current_workflow_name}" ]]; then
              keep_limit=$((KEEP_RUNS - 1))
            fi

            mapfile -t run_ids < <(
              jq -r --arg workflow_name "${workflow_name}" '
                [.[].workflow_runs[]? | select(.name == $workflow_name)]
                | sort_by(.created_at)
                | reverse
                | .[].id
              ' <<< "${runs_json}"
            )

            if ((${#run_ids[@]} <= keep_limit)); then
              echo "Deleted 0 old completed run(s) for ${workflow_name}."
              continue
            fi

            deleted_runs=0
            for index in "${!run_ids[@]}"; do
              run_id="${run_ids[$index]}"
              if [[ "${run_id}" == "${CURRENT_RUN_ID}" ]]; then
                continue
              fi

              if ((index < keep_limit)); then
                continue
              fi

              if gh api --method DELETE "repos/${GH_REPO}/actions/runs/${run_id}" >/dev/null; then
                deleted_runs=$((deleted_runs + 1))
              else
                echo "Run ${run_id} was already unavailable; continuing." >&2
              fi
            done

            echo "Deleted ${deleted_runs} old completed run(s) for ${workflow_name}."
          done
